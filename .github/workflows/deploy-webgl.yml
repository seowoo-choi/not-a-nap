name: Build and deploy WebGL

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Unity WebGL
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-WebGL-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-${{ runner.os }}-WebGL-

      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: auto
          targetPlatform: WebGL
          buildMethod: NotANap.Editor.WebBuildCommand.Build
          customParameters: -outputPath Builds/WebGL -uncompressedWebGL

      # game-ci builds inside Docker, so its output can be owned by root.
      - name: Fix build output permissions
        run: sudo chown -R "$(id -u):$(id -g)" Builds/WebGL

      - name: Prepare Pages artifact
        shell: bash
        run: |
          test -f Builds/WebGL/index.html
          # Unity reuses stable WebGL filenames between deployments. Without a
          # version query, a browser can combine an older data/wasm response
          # with the latest index and leave the canvas blank after navigation.
          perl -0pi -e 's/(\.(?:loader\.js|framework\.js|data|wasm))"/$1?v=$ENV{GITHUB_SHA}"/g' Builds/WebGL/index.html
          grep -F "?v=${GITHUB_SHA}" Builds/WebGL/index.html
          touch Builds/WebGL/.nojekyll
          build_bytes=$(du -sb Builds/WebGL | cut -f1)
          limit_bytes=$((50 * 1024 * 1024))
          echo "WebGL build: $build_bytes bytes"
          if [ "$build_bytes" -gt "$limit_bytes" ]; then
            echo "WebGL build exceeds the 50 MiB project limit."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Builds/WebGL

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
